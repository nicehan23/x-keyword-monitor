<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공부법 트윗 자동생성 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0f1419;
    --card: #16202a;
    --border: #2f3336;
    --text: #e7e9ea;
    --subtext: #71767b;
    --blue: #1d9bf0;
    --green: #00ba7c;
    --red: #f4212e;
    --orange: #ff7a00;
    --purple: #7856ff;
    --highlight-blue: #1a8cd8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header h1 span { color: var(--blue); }
  .header-actions { display: flex; gap: 12px; align-items: center; }
  .refresh-btn {
    background: var(--blue); color: white; border: none;
    padding: 8px 16px; border-radius: 20px; font-size: 14px;
    cursor: pointer; font-weight: 600;
  }
  .refresh-btn:hover { opacity: 0.85; }
  .auto-label { color: var(--subtext); font-size: 13px; }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 16px; padding: 24px 32px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px;
  }
  .stat-card .label { font-size: 13px; color: var(--subtext); margin-bottom: 8px; }
  .stat-card .value { font-size: 28px; font-weight: 700; }
  .stat-card .value.blue { color: var(--blue); }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.orange { color: var(--orange); }
  .stat-card .value.red { color: var(--red); }
  .stat-card .value.purple { color: var(--purple); }
  .top5-section { padding: 24px 32px; border-bottom: 1px solid var(--border); }
  .top5-section h2 {
    font-size: 18px; font-weight: 700; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .top5-section h2 .badge {
    background: var(--blue); color: white; font-size: 11px;
    font-weight: 600; padding: 3px 10px; border-radius: 10px;
  }
  .top5-list { display: flex; flex-direction: column; gap: 10px; }
  .top5-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 20px;
    display: flex; align-items: flex-start; gap: 16px;
    transition: border-color 0.2s;
  }
  .top5-card:hover { border-color: var(--blue); }
  .top5-card.rt-highlight {
    border-color: var(--highlight-blue);
    background: rgba(29, 155, 240, 0.08);
    box-shadow: 0 0 12px rgba(29, 155, 240, 0.15);
  }
  .top5-rank {
    font-size: 24px; font-weight: 800; color: var(--blue);
    min-width: 36px; text-align: center; line-height: 1.2;
  }
  .top5-rank.gold { color: #ffd700; }
  .top5-rank.silver { color: #c0c0c0; }
  .top5-rank.bronze { color: #cd7f32; }
  .top5-content { flex: 1; min-width: 0; }
  .top5-text {
    font-size: 15px; line-height: 1.5; margin-bottom: 8px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .top5-metrics {
    display: flex; gap: 16px; font-size: 13px;
    color: var(--subtext); flex-wrap: wrap;
  }
  .top5-metrics .metric { display: flex; align-items: center; gap: 4px; }
  .top5-metrics .metric.rt-hot { color: var(--highlight-blue); font-weight: 700; }
  .top5-empty { text-align: center; padding: 24px; color: var(--subtext); font-size: 14px; }
  .filters {
    padding: 0 32px; display: flex; gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .filter-tab {
    padding: 12px 16px; font-size: 14px; color: var(--subtext);
    cursor: pointer; border-bottom: 2px solid transparent;
    background: none; border-top: none; border-left: none;
    border-right: none; font-weight: 500;
  }
  .filter-tab:hover { color: var(--text); }
  .filter-tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 700; }
  .tweet-list { padding: 16px 32px; display: flex; flex-direction: column; gap: 12px; }
  .tweet-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px; transition: border-color 0.2s;
  }
  .tweet-card:hover { border-color: var(--blue); }
  .tweet-card.rt-highlight {
    border-color: var(--highlight-blue);
    background: rgba(29, 155, 240, 0.08);
    box-shadow: 0 0 12px rgba(29, 155, 240, 0.15);
  }
  .tweet-top {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 12px;
  }
  .tweet-status { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 12px; }
  .status-posted { background: rgba(0,186,124,0.15); color: var(--green); }
  .status-generated { background: rgba(29,155,240,0.15); color: var(--blue); }
  .status-failed { background: rgba(244,33,46,0.15); color: var(--red); }
  .tweet-date { font-size: 13px; color: var(--subtext); }
  .tweet-text { font-size: 16px; line-height: 1.6; white-space: pre-wrap; margin-bottom: 12px; }
  .engagement-bar {
    display: flex; gap: 20px; margin-bottom: 12px; padding: 10px 14px;
    background: rgba(255,255,255,0.03); border-radius: 10px;
    font-size: 13px; color: var(--subtext); flex-wrap: wrap;
  }
  .engagement-bar .eng-item { display: flex; align-items: center; gap: 5px; }
  .engagement-bar .eng-item .eng-value { font-weight: 600; color: var(--text); }
  .engagement-bar .eng-item.rt-hot .eng-value { color: var(--highlight-blue); font-weight: 800; }
  .engagement-bar .eng-updated { margin-left: auto; font-size: 11px; color: var(--subtext); opacity: 0.6; }
  .tweet-meta { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .tweet-chars {
    font-size: 12px; color: var(--subtext);
    background: rgba(255,255,255,0.05); padding: 3px 10px; border-radius: 8px;
  }
  .tweet-link { font-size: 13px; color: var(--blue); text-decoration: none; }
  .tweet-link:hover { text-decoration: underline; }
  .tweet-copy {
    font-size: 12px; color: var(--subtext); background: none;
    border: 1px solid var(--border); padding: 4px 12px;
    border-radius: 8px; cursor: pointer;
  }
  .tweet-copy:hover { border-color: var(--blue); color: var(--blue); }
  .source-toggle {
    font-size: 12px; color: var(--subtext); background: none;
    border: none; cursor: pointer; margin-top: 8px; padding: 0;
  }
  .source-toggle:hover { color: var(--blue); }
  .source-list {
    display: none; margin-top: 10px; padding: 12px;
    background: rgba(255,255,255,0.03); border-radius: 8px;
    font-size: 13px; color: var(--subtext); line-height: 1.8;
  }
  .source-list.open { display: block; }
  .empty { text-align: center; padding: 60px 20px; color: var(--subtext); }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-text { font-size: 16px; }
  .loading { text-align: center; padding: 40px; color: var(--subtext); }
  .spinner {
    display: inline-block; width: 24px; height: 24px;
    border: 3px solid var(--border); border-top-color: var(--blue);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .pagination { padding: 20px 32px; display: flex; justify-content: center; gap: 8px; }
  .page-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 8px 16px; border-radius: 8px;
    cursor: pointer; font-size: 14px;
  }
  .page-btn:hover { border-color: var(--blue); }
  .page-btn:disabled { opacity: 0.3; cursor: default; }
  .page-btn.active { background: var(--blue); border-color: var(--blue); }
  @media (max-width: 640px) {
    .header,.stats,.filters,.tweet-list,.pagination,.top5-section { padding-left:16px; padding-right:16px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .top5-card { flex-direction: column; gap: 8px; }
  }
</style>
</head>
<body>
<div class="header">
  <h1><span>공부법</span> 트윗 자동생성 대시보드</h1>
  <div class="header-actions">
    <span class="auto-label" id="lastUpdated"></span>
    <button class="refresh-btn" onclick="loadData()">새로고침</button>
  </div>
</div>
<div class="stats" id="statsArea">
  <div class="stat-card"><div class="label">전체 생성</div><div class="value blue" id="totalCount">-</div></div>
  <div class="stat-card"><div class="label">포스팅 완료</div><div class="value green" id="postedCount">-</div></div>
  <div class="stat-card"><div class="label">대기 중</div><div class="value orange" id="generatedCount">-</div></div>
  <div class="stat-card"><div class="label">실패</div><div class="value red" id="failedCount">-</div></div>
  <div class="stat-card"><div class="label">오늘 포스팅</div><div class="value purple" id="todayCount">-</div></div>
  <div class="stat-card"><div class="label">총 RT</div><div class="value blue" id="totalRT">-</div></div>
  <div class="stat-card"><div class="label">총 좋아요</div><div class="value red" id="totalLikes">-</div></div>
  <div class="stat-card"><div class="label">총 조회수</div><div class="value green" id="totalImpressions">-</div></div>
</div>
<div class="top5-section" id="top5Section">
  <h2>🏆 주간 Top 5 <span class="badge">Repost 기준</span></h2>
  <div class="top5-list" id="top5List">
    <div class="top5-empty">데이터 로딩 중...</div>
  </div>
</div>
<div class="filters">
  <button class="filter-tab active" data-filter="all" onclick="setFilter('all', this)">전체</button>
  <button class="filter-tab" data-filter="posted" onclick="setFilter('posted', this)">포스팅 완료</button>
  <button class="filter-tab" data-filter="generated" onclick="setFilter('generated', this)">대기 중</button>
  <button class="filter-tab" data-filter="failed" onclick="setFilter('failed', this)">실패</button>
</div>
<div id="tweetList" class="tweet-list">
  <div class="loading"><div class="spinner"></div><p style="margin-top:12px">불러오는 중...</p></div>
</div>
<div class="pagination" id="pagination"></div>
<script>
const SUPABASE_URL = "https://nuauodpvylurlynlwcfy.supabase.co";
const SUPABASE_KEY = "sb_publishable_A-2qRZZRzB5p-ClUDGygzQ_KX6wAykW";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const RT_HIGHLIGHT_THRESHOLD = 50;
let allTweets = [];
let currentFilter = 'all';
let currentPage = 1;
const PAGE_SIZE = 10;

async function loadData() {
  document.getElementById('tweetList').innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:12px">불러오는 중...</p></div>';
  try {
    const { data, error } = await db.from('generated_tweets').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    allTweets = data || [];
    updateStats();
    renderTop5();
    currentPage = 1;
    renderTweets();
    document.getElementById('lastUpdated').textContent = '업데이트: ' + new Date().toLocaleTimeString('ko-KR');
  } catch (e) {
    document.getElementById('tweetList').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">데이터를 불러올 수 없습니다<br><small style="color:#71767b">'+e.message+'</small></div></div>';
  }
}

function updateStats() {
  const posted = allTweets.filter(t => t.status === 'posted').length;
  const generated = allTweets.filter(t => t.status === 'generated').length;
  const failed = allTweets.filter(t => t.status === 'failed').length;
  const todayStr = new Date().toISOString().slice(0, 10);
  const todayPosted = allTweets.filter(t => t.status === 'posted' && t.created_at && t.created_at.slice(0, 10) === todayStr).length;
  const totalRT = allTweets.reduce((s, t) => s + (t.retweet_count || 0), 0);
  const totalLikes = allTweets.reduce((s, t) => s + (t.like_count || 0), 0);
  const totalImpressions = allTweets.reduce((s, t) => s + (t.impression_count || 0), 0);
  document.getElementById('totalCount').textContent = allTweets.length;
  document.getElementById('postedCount').textContent = posted;
  document.getElementById('generatedCount').textContent = generated;
  document.getElementById('failedCount').textContent = failed;
  document.getElementById('todayCount').textContent = todayPosted;
  document.getElementById('totalRT').textContent = formatNum(totalRT);
  document.getElementById('totalLikes').textContent = formatNum(totalLikes);
  document.getElementById('totalImpressions').textContent = formatNum(totalImpressions);
}

function renderTop5() {
  const container = document.getElementById('top5List');
  const weekAgo = new Date();
  weekAgo.setDate(weekAgo.getDate() - 7);
  const weekAgoStr = weekAgo.toISOString();
  const weeklyPosted = allTweets.filter(t => t.status === 'posted' && t.created_at && t.created_at >= weekAgoStr && (t.retweet_count || 0) > 0);
  weeklyPosted.sort((a, b) => (b.retweet_count || 0) - (a.retweet_count || 0));
  const top5 = weeklyPosted.slice(0, 5);
  if (top5.length === 0) {
    container.innerHTML = '<div class="top5-empty">이번 주 인게이지먼트 데이터가 아직 없습니다. 매일 오전 8시에 자동 업데이트됩니다.</div>';
    return;
  }
  const rankColors = ['gold', 'silver', 'bronze', '', ''];
  container.innerHTML = top5.map((t, i) => {
    const rt = t.retweet_count || 0;
    const likes = t.like_count || 0;
    const impressions = t.impression_count || 0;
    const replies = t.reply_count || 0;
    const bookmarks = t.bookmark_count || 0;
    const isHot = rt >= RT_HIGHLIGHT_THRESHOLD;
    const rankClass = rankColors[i] || '';
    const highlightClass = isHot ? 'rt-highlight' : '';
    const xLink = t.tweet_id ? ' <a class="tweet-link" href="https://x.com/i/web/status/'+t.tweet_id+'" target="_blank" style="font-size:12px">보기→</a>' : '';
    return '<div class="top5-card '+highlightClass+'"><div class="top5-rank '+rankClass+'">'+(i+1)+'</div><div class="top5-content"><div class="top5-text">'+escapeHtml(t.tweet_text)+xLink+'</div><div class="top5-metrics"><span class="metric '+(isHot?'rt-hot':'')+'">🔁 '+formatNum(rt)+'</span><span class="metric">♥ '+formatNum(likes)+'</span><span class="metric">👁 '+formatNum(impressions)+'</span><span class="metric">💬 '+formatNum(replies)+'</span><span class="metric">🔖 '+formatNum(bookmarks)+'</span></div></div></div>';
  }).join('');
}

function setFilter(filter, el) {
  currentFilter = filter;
  currentPage = 1;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTweets();
}

function getFiltered() {
  if (currentFilter === 'all') return allTweets;
  return allTweets.filter(t => t.status === currentFilter);
}

function renderTweets() {
  const filtered = getFiltered();
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const container = document.getElementById('tweetList');
  if (page.length === 0) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">아직 생성된 트윗이 없습니다</div></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  container.innerHTML = page.map((t, i) => {
    const date = t.created_at ? new Date(t.created_at).toLocaleString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '-';
    const statusLabel = {posted:'포스팅 완료',generated:'대기 중',failed:'실패'}[t.status] || t.status;
    const statusClass = 'status-'+t.status;
    const rt = t.retweet_count || 0;
    const isHot = rt >= RT_HIGHLIGHT_THRESHOLD;
    const highlightClass = isHot ? 'rt-highlight' : '';
    const xLink = t.tweet_id ? '<a class="tweet-link" href="https://x.com/i/web/status/'+t.tweet_id+'" target="_blank">X에서 보기 →</a>' : '';
    let engagementHtml = '';
    if (t.status === 'posted') {
      const updatedAt = t.engagement_updated_at ? new Date(t.engagement_updated_at).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
      engagementHtml = '<div class="engagement-bar"><span class="eng-item '+(isHot?'rt-hot':'')+'">🔁 RT <span class="eng-value">'+formatNum(rt)+'</span></span><span class="eng-item">♥ 좋아요 <span class="eng-value">'+formatNum(t.like_count||0)+'</span></span><span class="eng-item">👁 조회수 <span class="eng-value">'+formatNum(t.impression_count||0)+'</span></span><span class="eng-item">💬 답글 <span class="eng-value">'+formatNum(t.reply_count||0)+'</span></span><span class="eng-item">🔖 북마크 <span class="eng-value">'+formatNum(t.bookmark_count||0)+'</span></span>'+(updatedAt?'<span class="eng-updated">업데이트: '+updatedAt+'</span>':'')+'</div>';
    }
    let sources = '';
    if (t.source_trends) {
      try {
        const arr = typeof t.source_trends === 'string' ? JSON.parse(t.source_trends) : t.source_trends;
        if (arr.length > 0) {
          const id = 'src-'+(start+i);
          sources = '<button class="source-toggle" onclick="document.getElementById(\''+id+'\').classList.toggle(\'open\')">📊 참고 트렌드 보기</button><div class="source-list" id="'+id+'">'+arr.map((s,j)=>(j+1)+'. '+s).join('<br>')+'</div>';
        }
      } catch(e) {}
    }
    return '<div class="tweet-card '+highlightClass+'"><div class="tweet-top"><span class="tweet-status '+statusClass+'">'+statusLabel+'</span><span class="tweet-date">'+date+'</span></div><div class="tweet-text">'+escapeHtml(t.tweet_text)+'</div>'+engagementHtml+'<div class="tweet-meta"><span class="tweet-chars">'+t.tweet_text.length+'자</span>'+xLink+'<button class="tweet-copy" onclick="copyTweet(this, \''+escapeJs(t.tweet_text)+'\')">복사</button></div>'+sources+'</div>';
  }).join('');
  const pagEl = document.getElementById('pagination');
  if (totalPages <= 1) { pagEl.innerHTML = ''; return; }
  let pagHtml = '<button class="page-btn" onclick="goPage('+(currentPage-1)+')" '+(currentPage===1?'disabled':'')+'>←</button>';
  for (let p = 1; p <= totalPages; p++) {
    pagHtml += '<button class="page-btn '+(p===currentPage?'active':'')+'" onclick="goPage('+p+')">'+p+'</button>';
  }
  pagHtml += '<button class="page-btn" onclick="goPage('+(currentPage+1)+')" '+(currentPage===totalPages?'disabled':'')+'>→</button>';
  pagEl.innerHTML = pagHtml;
}

function goPage(p) {
  const totalPages = Math.ceil(getFiltered().length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderTweets();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function copyTweet(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '복사됨!';
    btn.style.color = 'var(--green)';
    btn.style.borderColor = 'var(--green)';
    setTimeout(() => { btn.textContent='복사'; btn.style.color=''; btn.style.borderColor=''; }, 1500);
  });
}

function formatNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return String(n);
}

function escapeHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escapeJs(str) { return str.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n'); }

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
